function getWeekDates(offset=0){
  const t=new Date();const day=t.getDay();
  const mon=new Date(t);mon.setDate(t.getDate()+(day===0?-6:1-day)+offset*7);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const f=d=>d.toISOString().split("T")[0];
  const lbl=`${mon.toLocaleDateString("pt-BR",{day:"numeric",month:"short"})} – ${sun.toLocaleDateString("pt-BR",{day:"numeric",month:"short"})}`;
  return {start:f(mon),end:f(sun),label:lbl};
}
const scaleMacros=(mac,f)=>!mac?null:(f==null||f===1?mac:{protein:Math.round(mac.protein*f),carbs:Math.round(mac.carbs*f),fat:Math.round(mac.fat*f),calories:Math.round((mac.calories||0)*f)});
const mealMacros=m=>m&&m.macros?scaleMacros(m.macros,m.portionEaten!=null?m.portionEaten:1):null;
const calOf=m=>{const mm=mealMacros(m);return mm?(mm.calories||Math.round(4*mm.protein+4*mm.carbs+9*mm.fat)):0;};

/* daily nutrition targets — Mifflin-St Jeor BMR + activity + goal (general estimates) */
const ACTIVITY=[
  {id:"sed",   label:"Sedentário", desc:"pouco/nenhum exercício", f:1.2},
  {id:"leve",  label:"Leve",       desc:"1–3× por semana",       f:1.375},
  {id:"mod",   label:"Moderado",   desc:"3–5× por semana",       f:1.55},
  {id:"ativo", label:"Ativo",      desc:"6–7× por semana",       f:1.725},
  {id:"muito", label:"Muito ativo",desc:"atleta / trabalho físico",f:1.9},
];
const GOALS=[
  {id:"deficit",  label:"Leve déficit",  mul:0.85, pk:1.8},
  {id:"manter",   label:"Manter peso",   mul:1.0,  pk:1.6},
  {id:"superavit",label:"Leve superávit",mul:1.1,  pk:1.8},
];
function computeTargets(p){
  if(!p||!p.weight||!p.height||!p.age) return null;
  const w=+p.weight,h=+p.height,a=+p.age;
  if(!(w>0&&h>0&&a>0)) return null;
  const sc = p.sex==="M"?5 : p.sex==="F"?-161 : -78;
  const bmr = 10*w + 6.25*h - 5*a + sc;
  const act = (ACTIVITY.find(x=>x.id===p.activity)||ACTIVITY[1]).f;
  const goal = GOALS.find(g=>g.id===p.goal)||GOALS[1];
  const calories = Math.round(bmr*act*goal.mul/10)*10;
  const protein = Math.round(w*goal.pk/5)*5;
  const fat = Math.round(calories*0.27/9/5)*5;
  const carbs = Math.max(0, Math.round((calories - protein*4 - fat*9)/4/5)*5);
  const bmi = Math.round(w/Math.pow(h/100,2)*10)/10;
  return {calories,protein,carbs,fat,bmi};
}

/* ── SYNC (Firebase) ───────────────────────────────────────── */
function parseFbConfig(text){
  if(!text) return null;
  try{ const o=JSON.parse(text); if(o&&o.apiKey) return o; }catch{}
  try{
    const m=String(text).match(/\{[\s\S]*\}/); if(!m) return null;
    let t=m[0]
      .replace(/([{,]\s*)([a-zA-Z0-9_$]+)\s*:/g,'$1"$2":')
      .replace(/'/g,'"')
      .replace(/,(\s*[}\]])/g,'$1');
    const o=JSON.parse(t); return o&&o.apiKey?o:null;
  }catch{ return null; }
}

async function claudeCall(apiKey,system,messages,maxTokens=120){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,system,messages}),
  });
  if(!r.ok) throw new Error(r.status);
  return (await r.json()).content[0].text.trim();
}

function parseEstimate(txt,fallbackFood){
  const j=JSON.parse(txt.match(/\{[\s\S]*\}/)?.[0]||txt);
  const p=Math.max(0,Math.round(+j.protein||0));
  const c=Math.max(0,Math.round(+j.carbs||0));
  const f=Math.max(0,Math.round(+j.fat||0));
  return {
    food:(j.food||fallbackFood||"").trim(),
    category:(j.category||"").trim()||null,
    portion:(j.portion||"").trim()||null,
    macros:{protein:p,carbs:c,fat:f,calories:Math.max(0,Math.round(+j.calories|| (4*p+4*c+9*f)))},
  };
}

  const list=knownCats.map(c=>c.label).join(", ");
  const sys=`Você estima informações nutricionais de refeições. Responda SOMENTE JSON válido, sem texto extra:
{"food":"nome curto em português (até 6 palavras)","category":"categoria curta de 1-2 palavras — use uma destas se servir bem: ${list}; senão CRIE uma nova categoria curta e relevante (ex: Massa, Salada, Sopa, Risoto)","portion":"porção estimada (ex: 1 prato, 200 g)","protein":gramas,"carbs":gramas,"fat":gramas,"calories":kcal}
Estime valores realistas para a porção indicada. Use números.`;
  const content=b64
    ? [{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:`Identifique a refeição da foto, estime a PORÇÃO pelo tamanho visível e os macros.${food?` Dica do usuário: ${food}.`:""}`}]
    : [{type:"text",text:`Refeição: "${food}"`}];
  const txt=await claudeCall(apiKey,sys,[{role:"user",content}],320);
  return parseEstimate(txt,food);
}

async function weeklyReflection(apiKey,summary){
  const txt=await claudeCall(apiKey,
    `Você é um acompanhante gentil de alimentação consciente — NÃO um nutricionista de dieta restritiva.
NUNCA fale de "comida proibida", culpa, peso ideal ou restrição. NUNCA julgue. Foque em PADRÕES, descobertas e autoconhecimento.
Analise os dados e liste de 4 a 6 DESCOBERTAS específicas e perspicazes — coisas que a pessoa talvez não tenha percebido sozinha
(ex: ligações entre horário e motivo, dias/horários de maior gatilho emocional, combinações de comida, equilíbrio de proteína/vegetais,
saciedade ligada a comer fora, variedade). Cada descoberta: 1 frase curta, concreta e citando números quando der.
Pode dar uma sugestão suave no fim. Tom caloroso. Português do Brasil. No máximo 1 emoji no total.
Responda APENAS as descobertas, uma por linha, começando cada linha com "• ". Sem título, sem introdução.`,
    [{role:"user",content:`Dados do período:\n${summary}\n\nListe as descobertas.`}],520);

/* ── CATEGORY DROPDOWN ──────────────────────────────────────── */
function CatDropdown({cats,current,onSelect,onClose,anchor}){
  const ref=useRef();
  const [pos,setPos]=useState(null);
  useEffect(()=>{
    const place=()=>{
      if(!anchor||!anchor.current) return;
      const r=anchor.current.getBoundingClientRect();
      const W=212, H=Math.min(264, cats.length*40+12);
      let top=r.bottom+6, left=r.left;
      if(left+W>window.innerWidth-8) left=window.innerWidth-8-W;
      if(left<8) left=8;
      if(top+H>window.innerHeight-8) top=Math.max(8, r.top-6-H);
      setPos({top,left});
    };
    place();
    const fn=e=>{ if(ref.current&&!ref.current.contains(e.target)&&!(anchor&&anchor.current&&anchor.current.contains(e.target))) onClose(); };
    document.addEventListener("mousedown",fn);
    document.addEventListener("touchstart",fn);
    window.addEventListener("scroll",place,true);
    window.addEventListener("resize",place);
    return ()=>{document.removeEventListener("mousedown",fn);document.removeEventListener("touchstart",fn);window.removeEventListener("scroll",place,true);window.removeEventListener("resize",place);};
  },[]);
  return ReactDOM.createPortal(
    <div ref={ref} className="fixed z-[80] bg-white rounded-2xl shadow-2xl border border-black/5 py-1.5 w-[212px] max-h-64 overflow-y-auto fade-in"
      style={pos?{top:pos.top,left:pos.left}:{visibility:"hidden",top:0,left:0}}>
      {cats.map(c=>(
        <button key={c.id} onClick={()=>{onSelect(c);onClose();}}
          className="w-full flex items-center gap-2.5 px-3.5 py-2 text-sm hover:bg-black/5 transition-colors">
          <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor:c.c.solid}}/>
          <span>{c.emoji}</span>
          <span className="flex-1 text-left text-ink/80">{c.label}</span>
          {current?.id===c.id && <span className="text-coral text-xs">✓</span>}
        </button>
      ))}
    </div>, document.body);
}
function CatBadge({cat,loading,cats,onChange}){
  const [open,setOpen]=useState(false);
  const btn=useRef();
  if(loading) return <span className="inline-flex items-center gap-1.5 text-xs px-3 py-1 rounded-full bg-black/5 text-ink/40 pulse">

}

/* ── PHOTO UPLOAD ───────────────────────────────────────────── */
function PhotoUpload({apiKey,cats,photoUrl,onAnalyze,onClear}){
  const fileRef=useRef();
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  async function handleFile(e){
    const file=e.target.files[0]; if(!file) return;
    setErr("");
    const reader=new FileReader();
    reader.onload=async ev=>{
      const [meta,b64]=ev.target.result.split(",");
      const mime=meta.match(/:(.*?);/)[1];
      const url=URL.createObjectURL(file);
      onAnalyze({photoUrl:url});
      if(apiKey){
        setLoading(true);
        try{
          const r=await estimateMeal("",apiKey,cats,b64,mime);
          onAnalyze({photoUrl:url,food:r.food,category:r.category,portion:r.portion,macros:r.macros});
        }catch{ setErr("Erro na análise. Verifique sua API key."); }
        finally{ setLoading(false); }
      }
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }
  if(photoUrl) return <div className="relative rounded-[22px] overflow-hidden bg-black/5 fade-in">
    <img src={photoUrl} alt="" className="w-full h-44 object-cover"/>
    {loading && <div className="absolute inset-0 bg-ink/55 flex flex-col items-center justify-center text-cream gap-2">
      <Spinner size="w-6 h-6"/><span className="text-sm font-medium">Identificando e medindo a porção…</span>
    </div>}
    {!loading && <button onClick={onClear} className="absolute top-2.5 right-2.5 w-7 h-7 bg-ink/55 text-white rounded-full flex items-center justify-center text-xs font-bold">✕</button>}
    {err && <p className="text-xs text-coral p-2 bg-white">{err}</p>}
    {!apiKey && !loading && <div className="absolute bottom-0 inset-x-0 bg-ink/55 text-cream text-[11px] text-center py-1.5">Configure a API key para identificar e medir porção</div>}
  </div>;
  return <>
    <input ref={fileRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFile}/>
    <button onClick={()=>fileRef.current.click()}
      className="w-full border-2 border-dashed border-ink/15 rounded-[22px] py-3.5 text-sm text-ink/45 flex items-center justify-center gap-2 hover:border-coral/50 hover:text-coral transition-colors">
      <span className="text-lg">📷</span><span>Foto da refeição</span>
      <span className="text-[10px] bg-black/5 rounded-full px-2 py-0.5">ajuda a medir a porção</span>
    </button>
  </>;
}

function RegisterTab({cats,apiKey,meals,onResolveCat,onSave,onOpenSettings}){

  const [date,setDate]       = useState(todayStr);

  const [note,setNote]       = useState("");
  const [origin,setOrigin]   = useState("Casa");
  const [fullness,setFull]   = useState("");
  const [ate,setAte]         = useState(1);
  const [cat,setCat]         = useState(null);
  const [catLoad,setCatLoad] = useState(false);
  const [photo,setPhoto]     = useState("");
  const [portion,setPortion] = useState("");
  const [macros,setMacros]   = useState(null);
  const [estLoad,setEstLoad] = useState(false);
  const [estErr,setEstErr]   = useState("");

  const recent=(()=>{
    const seen=new Map();
    [...meals].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time))
      .forEach(m=>{ if(!seen.has(m.food)) seen.set(m.food,m.cat); });
    return [...seen.entries()].slice(0,6);
  })();

  // instant local category guess (no API) while typing, unless already set
  useEffect(()=>{
    if(!food.trim()||food.trim().length<3){ if(!macros)setCat(null); return; }
    if(cat) return;
    const id=setTimeout(()=>{ const c=onResolveCat(classifyLocal(food)); if(c)setCat(c); },450);
    return ()=>clearTimeout(id);
  },[food]);

  function handlePhoto({photoUrl,food:f,category,portion:p,macros:m}){
    setPhoto(photoUrl||"");
    if(f&&!food.trim()) setFood(f);
    if(category){ const c=onResolveCat(category); if(c)setCat(c); }
    if(p) setPortion(p);
    if(m) setMacros(m);
  }

  async function estimate(){
    if(!apiKey){ onOpenSettings(); return; }
    if(!food.trim()) return;
    setEstLoad(true); setEstErr("");
    try{
      const r=await estimateMeal(food.trim(),apiKey,cats,null,null);
      if(r.category){ const c=onResolveCat(r.category); if(c)setCat(c); }
      setPortion(r.portion||""); setMacros(r.macros);
    }catch{ setEstErr("Não consegui estimar agora. Verifique a API key."); }
    finally{ setEstLoad(false); }
  }

  const showNote = reasons.some(r=>r!=="Fome");
  const valid = food.trim()&&hunger&&reasons.length>0;

  function submit(){
    if(!valid) return;
    onSave({id:Date.now(),food:food.trim(),time,date,
      cat:cat?.label||"Lanche",hunger,reasons,
      reasonNote:showNote?(note.trim()||null):null,origin,fullness:fullness||null,
      portionEaten:ate,portion:portion||null,macros:macros||null,photoUrl:photo});
    setFood("");setCat(null);setHunger("");setReasons([]);setNote("");setFull("");setAte(1);
    setPhoto("");setPortion("");setMacros(null);setTime(nowTime());setDate(todayStr());
  }
  const todayCount=meals.filter(m=>m.date===todayStr()).length;
  const todayCal=meals.filter(m=>m.date===todayStr()).reduce((s,m)=>s+calOf(m),0);
  const shownMacros=scaleMacros(macros,ate);

  return <div className="pt-6 pb-10 space-y-4 stagger">
    <div className="relative rounded-[28px] p-6 overflow-hidden border border-black/[0.04] shadow-[0_10px_30px_-18px_rgba(180,90,40,0.35)]"
      style={{background:"radial-gradient(120% 90% at 12% 8%, #FFCDA6 0%, rgba(255,205,166,0) 55%), radial-gradient(110% 80% at 92% 0%, #FFE3A6 0%, rgba(255,227,166,0) 52%), radial-gradient(120% 110% at 78% 100%, #FFC9C2 0%, rgba(255,201,194,0) 58%), radial-gradient(100% 90% at 30% 95%, #FFD9B0 0%, rgba(255,217,176,0) 55%), linear-gradient(160deg,#FFF4E6 0%,#FDEEDD 100%)"}}>
      <div className="relative">
        <p className="text-ink/45 text-xs font-bold uppercase tracking-[0.14em] capitalize">{todayLabel()}</p>
        <h2 className="font-display text-[33px] leading-[1.05] mt-2 text-ink">O que você comeu?</h2>
        <p className="text-ink/55 text-sm mt-2">A IA cuida da categoria e dos macros 🤖</p>
        <div className="flex gap-2 mt-4">
          <span className="bg-white/55 backdrop-blur rounded-full px-3 py-1.5 text-sm font-bold text-ink/75 border border-white/60">{todayCount} {todayCount===1?"refeição":"refeições"} hoje</span>
          {todayCal>0 && <span className="bg-white/55 backdrop-blur rounded-full px-3 py-1.5 text-sm font-bold text-ink/75 border border-white/60">{todayCal} kcal</span>}
        </div>
      </div>
    </div>

    {!apiKey && <button onClick={onOpenSettings}
      className="w-full bg-coral/10 border border-coral/20 rounded-2xl px-4 py-3 flex items-center justify-between">
      <div className="text-left">
        <p className="text-sm font-bold text-coral">Conecte sua API Key</p>
        <p className="text-[11px] text-coral/70 mt-0.5">Para análise de foto, macros e categorias inteligentes</p>
      </div>
      <span className="text-coral text-lg">→</span>
    </button>}

    <Card>
      <Label>Alimento</Label>
      <input value={food} onChange={e=>setFood(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}
        placeholder="Ex: Salada de quinoa com frango…"
        className="w-full mt-2.5 text-ink placeholder-ink/25 text-lg outline-none bg-transparent font-medium"/>
      {(cat||catLoad) && <div className="mt-3 pt-3 border-t border-black/5 flex items-center gap-2">

function InsightsTab({meals,cats,apiKey,profile,onOpenSettings}){
  const [mode,setMode]=useState("week");
  const targets=computeTargets(profile);
  const [wOffset,setWOffset]=useState(0);
  const [detail,setDetail]=useState(null);
  const [reflection,setReflection]=useState([]);
  const [reflLoad,setReflLoad]=useState(false);
  const [reflErr,setReflErr]=useState("");

  const dayRange=off=>{const t=new Date();t.setDate(t.getDate()+off);const s=t.toISOString().split("T")[0];return {start:s,end:s,label:dateLabel(s)};};
  const week = mode==="week"?getWeekDates(wOffset):dayRange(wOffset);
  const isDay = mode==="day";
  const wm=meals.filter(m=>m.date>=week.start&&m.date<=week.end);
  const total=wm.length||1;

  const mm=wm.filter(m=>mealMacros(m));
  const daysLogged=isDay?1:(new Set(wm.map(m=>m.date)).size||1);
  const sum=k=>mm.reduce((s,m)=>s+(mealMacros(m)[k]||0),0);
  const avg=k=>Math.round(sum(k)/daysLogged);
  const avgP=avg("protein"),avgC=avg("carbs"),avgF=avg("fat"),avgCal=avg("calories");
  const pc=sum("protein")*4, cc=sum("carbs")*4, fc=sum("fat")*9, totCal=pc+cc+fc||1;
  const proteinShare=Math.round(pc/totCal*100);

  const byHunger=Object.fromEntries(HUNGER_LEVELS.map(h=>[h.label,wm.filter(m=>m.hunger===h.label).length]));
  const realHunger=wm.filter(m=>reasonsOf(m).includes("Fome")).length;
  const realPct=Math.round(realHunger/total*100);
  const out=wm.filter(m=>m.origin&&m.origin!=="Casa").length;
  const distinct=new Set(wm.map(m=>m.food.toLowerCase().trim())).size;
  const tooFull=wm.filter(m=>m.fullness==="Cheio demais").length;
  const fullLogged=wm.filter(m=>m.fullness).length;

  const foodCounts={}; wm.forEach(m=>{const k=m.food.trim(); foodCounts[k]=(foodCounts[k]||0)+1;});
  const topFoods=Object.entries(foodCounts).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>1).slice(0,3);
  const avgMeals=Math.round(wm.length/daysLogged*10)/10;
  const proteinPerMeal=mm.length?Math.round(sum("protein")/mm.length):0;

  const reasonAgg={};
  wm.forEach(m=>{ reasonsOf(m).forEach(r=>{ if(r!=="Fome") reasonAgg[r]=(reasonAgg[r]||0)+1; }); });
  const topReasons=Object.entries(reasonAgg).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const maxReason=topReasons[0]?.[1]||1;

  const timeAgg=Object.fromEntries(TIME_BUCKETS.map(b=>[b.key,0]));
  wm.forEach(m=>{ timeAgg[timeBucket(m.time).key]++; });
  const maxTime=Math.max(1,...Object.values(timeAgg));
  const dayAgg=WEEKDAYS.map(()=>0); wm.forEach(m=>{ dayAgg[weekdayIdx(m.date)]++; });
  const maxDay=Math.max(1,...dayAgg);

  // previous-period comparison
  const prev = mode==="week"?getWeekDates(wOffset-1):dayRange(wOffset-1);
  const pwm=meals.filter(m=>m.date>=prev.start&&m.date<=prev.end);
  const pmm=pwm.filter(m=>mealMacros(m));
  const pDays=isDay?1:(new Set(pwm.map(m=>m.date)).size||1);
  const prevAvgP=Math.round(pmm.reduce((s,m)=>s+(mealMacros(m).protein||0),0)/pDays);
  const prevOut=pwm.filter(m=>m.origin&&m.origin!=="Casa").length;
  const pDelta=pwm.length?avgP-prevAvgP:null;
  const oDelta=pwm.length?out-prevOut:null;
  const perLabel=isDay?"no dia":"/ dia";

  const perWord=isDay?"neste dia":"esta semana";
  const proteinNote = mm.length===0 ? "Estime os macros das refeições para ver seu equilíbrio nutricional."
    : proteinShare<15 ? "Sua proteína está numa fatia baixa das calorias. Ovos, frango, peixe, feijão e iogurte ajudam no equilíbrio 💪"
    : proteinShare>30 ? `Bom aporte de proteína ${perWord}! Cuide para manter variedade de vegetais e fibras também.`
    : `Distribuição de macros equilibrada ${perWord} 🌿`;

  const tip = topReasons.length>0
    ? `Você comeu ${topReasons[0][1]}× por ${topReasons[0][0].toLowerCase()} ${perWord}. Reparar nesse gatilho antes de comer já é meio caminho. 🌿`
    : wm.length===0 ? "Sem registros." : `Quase tudo veio de fome real ${perWord} — alimentação bem consciente! ✦`;

  const open=(title,subtitle,ms,extra="")=>setDetail({title,subtitle,meals:ms,extra});

  async function genReflection(){
    if(!apiKey){ setReflErr("Configure sua API key nas configurações ⚙️"); return; }
    setReflErr(""); setReflLoad(true); setReflection([]);
    const catLines=cats.map(c=>{const n=wm.filter(m=>m.cat===c.label).length;return n?`${c.label}:${n}`:null;}).filter(Boolean).join(", ");
    const peak=TIME_BUCKETS.reduce((a,b)=>timeAgg[b.key]>timeAgg[a.key]?b:a);
    const mealList=[...wm].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,28)
      .map(m=>{const mm2=mealMacros(m);return `${WEEKDAYS[weekdayIdx(m.date)]} ${m.time} ${m.food} [${m.cat}] fome:${m.hunger||"?"} motivo:${reasonsOf(m).join("/")||"?"}${mm2?` ${mm2.calories}kcal P${mm2.protein}`:""}${m.fullness?` sac:${m.fullness}`:""} (${m.origin})`;}).join("\n");
    const summary=
`Período: ${isDay?"1 dia":daysLogged+" dias"} (${wm.length} refeições, ~${avgMeals}/dia)
Categorias: ${catLines||"—"}
Macros ${isDay?"do dia":"média/dia"}: proteína ${avgP}g, carbo ${avgC}g, gordura ${avgF}g, ~${avgCal} kcal (proteína ${proteinShare}% das calorias, ${proteinPerMeal}g por refeição)
Em casa: ${total-out} | Fora (restaurante/delivery): ${out}
Comeu por fome real: ${realHunger} de ${wm.length}
Outros motivos: ${topReasons.map(([n,v])=>`${n} ${v}x`).join(", ")||"nenhum"}
Distribuição horário: ${TIME_BUCKETS.map(b=>`${b.label} ${timeAgg[b.key]}`).join(", ")} (pico ${peak.label})
Variedade: ${distinct} pratos diferentes; repetidos: ${topFoods.map(([f,v])=>`${f} ${v}x`).join(", ")||"nenhum"}
Vezes "cheio demais": ${tooFull} de ${fullLogged||0} com saciedade marcada

Refeições:
${mealList}`;
    try{ setReflection(await weeklyReflection(apiKey,summary)); }
    catch{ setReflErr("Não consegui gerar agora. Verifique sua API key."); }
    finally{ setReflLoad(false); }
  }
  useEffect(()=>{ setReflection([]); setReflErr(""); },[wOffset,mode]);

  return <div className="pt-6 pb-10 space-y-4 slide-up">
    <h2 className="font-display text-[34px] leading-none text-ink mb-3">Insights</h2>

    {/* mode toggle */}
    <div className="flex bg-ink/[0.06] rounded-full p-1">
      {[["day","Dia"],["week","Semana"]].map(([m,lbl])=>(
        <button key={m} onClick={()=>{setMode(m);setWOffset(0);}}
          className={`flex-1 py-2 rounded-full text-sm font-bold transition-all ${mode===m?"bg-ink text-cream shadow":"text-ink/45"}`}>{lbl}</button>
      ))}
    </div>

    {/* period selector */}
    <div className="flex items-center justify-between bg-card rounded-[22px] px-3 py-2.5 border border-black/5 shadow-sm">
      <button onClick={()=>setWOffset(o=>o-1)} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-black/5 text-ink/50 text-xl">‹</button>
      <div className="text-center">
        <p className="text-xs text-ink/40 font-semibold">
          {isDay
            ? (wOffset===0?"Hoje":wOffset===-1?"Ontem":`${Math.abs(wOffset)} dias atrás`)
            : (wOffset===0?"Semana atual":wOffset===-1?"Semana passada":`${Math.abs(wOffset)} sem. atrás`)}
        </p>
        <p className="text-sm font-bold text-ink mt-0.5 capitalize">{week.label}</p>
        <p className="text-xs text-ink/35">{wm.length} {wm.length===1?"refeição":"refeições"}</p>
      </div>
      <button onClick={()=>setWOffset(o=>Math.min(0,o+1))} disabled={wOffset===0}
        className={`w-9 h-9 flex items-center justify-center rounded-full text-xl ${wOffset===0?"text-ink/15":"text-ink/50 hover:bg-black/5"}`}>›</button>
    </div>

    {wm.length===0
      ? <div className="text-center py-14 text-ink/40"><div className="text-4xl mb-3">📭</div><p className="font-semibold">Sem registros {isDay?"neste dia":"nesta semana"}</p></div>
      : <>
        {/* NUTRITION centerpiece */}
        <Card>
          <div className="flex items-center justify-between mb-1">
            <p className="font-display text-xl text-ink">Nutrição {isDay?"do dia":"da semana"}</p>
            <span className="text-[10px] text-ink/40">{isDay?"total":"média / dia"}</span>
          </div>
          {mm.length===0
            ? <p className="text-sm text-ink/45 mt-2">Nenhuma refeição com macros ainda. Estime os macros ao registrar (ou pela foto) para acompanhar.</p>
            : <>
              <div className="grid grid-cols-4 gap-2 mt-3">
                <div className="rounded-2xl px-2 py-3 text-center" style={{backgroundColor:"#211C16"}}>
                  <div className="font-display text-xl text-cream leading-none">{avgCal}</div>
                  <div className="text-[10px] text-cream/60 mt-1 font-medium">kcal</div>
                </div>
                {MACROS.map(mc=>(
                  <div key={mc.key} className="rounded-2xl px-2 py-3 text-center" style={{backgroundColor:mc.color+"33"}}>
                    <div className="font-display text-xl text-ink leading-none">{[avgP,avgC,avgF][MACROS.indexOf(mc)]}<span className="text-[11px] font-sans">g</span></div>
                    <div className="text-[10px] text-ink/55 mt-1 font-semibold">{mc.label}</div>
                  </div>
                ))}
              </div>
              <div className="mt-4">
                <div className="flex justify-between text-[11px] text-ink/45 mb-1.5">
                  <span>Equilíbrio de macros (por caloria)</span>
                  <span>{proteinShare}% proteína</span>
                </div>
                <div className="flex h-3 rounded-full overflow-hidden bg-black/5">
                  <div className="bar" style={{width:`${pc/totCal*100}%`,backgroundColor:MACROS[0].color}}/>
                  <div className="bar" style={{width:`${cc/totCal*100}%`,backgroundColor:MACROS[1].color}}/>
                  <div className="bar" style={{width:`${fc/totCal*100}%`,backgroundColor:MACROS[2].color}}/>
                </div>
                <div className="flex gap-3 mt-2">
                  {MACROS.map(mc=><span key={mc.key} className="text-[11px] text-ink/55 flex items-center gap-1"><span className="w-2 h-2 rounded-full" style={{backgroundColor:mc.color}}/>{mc.label}</span>)}
                </div>
              </div>
              <p className="text-sm text-ink/65 leading-relaxed mt-4 bg-cream rounded-2xl px-3.5 py-3">{proteinNote}</p>
            </>}
        </Card>

        {/* daily targets vs actual */}
        {targets
          ? <Card>
              <div className="flex items-center justify-between mb-1">
                <p className="font-display text-xl text-ink">Metas diárias</p>
                <button onClick={onOpenSettings} className="text-[11px] text-coral font-bold">editar</button>
              </div>
              <p className="text-xs text-ink/40 mb-3">{isDay?"Hoje vs sua meta":"Média por dia vs sua meta"}</p>
              {[["Calorias",avgCal,targets.calories,"kcal","#211C16"],
                ["Proteína",avgP,targets.protein,"g",MACROS[0].color],
                ["Carbo",avgC,targets.carbs,"g",MACROS[1].color],
                ["Gordura",avgF,targets.fat,"g",MACROS[2].color]].map(([lbl,act,tgt,unit,col])=>{
                const pctv=Math.min(100,Math.round(act/tgt*100));
                return <div key={lbl} className="mb-3 last:mb-0">
                  <div className="flex items-center justify-between text-sm mb-1.5">
                    <span className="font-semibold text-ink/75">{lbl}</span>
                    <span className="text-ink/45 text-xs"><span className="font-bold text-ink/75">{act}</span> / {tgt} {unit} · {Math.round(act/tgt*100)}%</span>
                  </div>
                  <div className="bg-black/5 rounded-full h-2.5 overflow-hidden">
                    <div className="h-2.5 rounded-full bar" style={{width:`${pctv}%`,backgroundColor:col}}/>
                  </div>
                </div>;
              })}
              <p className="text-[11px] text-ink/35 mt-3 leading-relaxed">Referência geral (IMC {targets.bmi}). Use como bússola, não como regra. 🌿</p>
            </Card>
          : <button onClick={onOpenSettings} className="w-full text-left bg-card rounded-[26px] p-5 border border-black/5 shadow-sm active:scale-95 transition-transform">
              <div className="flex items-center justify-between">
                <div>
                  <p className="font-display text-xl text-ink">🎯 Defina suas metas</p>
                  <p className="text-sm text-ink/45 mt-1">Calorias e macros ideais por dia, do seu jeito.</p>
                </div>
                <span className="text-coral text-lg">→</span>
              </div>
            </button>}

        {/* stat tiles */}
        <div className="grid grid-cols-2 gap-3">
          <StatTile value={`${realPct}%`} label="Por fome real" sub="vs outros motivos" bg={px(4).bg} text={px(4).text}
            onClick={()=>open("🍽️ Comi por fome real",`${realHunger} · ${week.label}`,wm.filter(m=>reasonsOf(m).includes("Fome")))}/>
          <StatTile value={`${out}×`} label="Comeu fora" sub="restaurante + delivery" bg={px(5).bg} text={px(5).text}
            onClick={()=>open("🍴 Fora de casa",`${out} · ${week.label}`,wm.filter(m=>m.origin&&m.origin!=="Casa"))}/>
          <StatTile value={distinct} label="Variedade" sub="pratos diferentes" bg={px(3).bg} text={px(3).text}/>
          <StatTile value={`${tooFull}${fullLogged?`/${fullLogged}`:""}`} label={'Comeu "cheio demais"'} sub={fullLogged?"refeições":"registre a saciedade"} bg={px(1).bg} text={px(1).text}/>
        </div>

        {/* period comparison */}
        {pwm.length>0 && (pDelta!==null||oDelta!==null) && <div className="flex gap-3">
          {pDelta!==null && <div className="flex-1 bg-card rounded-2xl p-3.5 border border-black/5 shadow-sm">
            <p className="text-[11px] text-ink/40">Proteína {perLabel} vs anterior</p>
            <p className={`text-sm font-bold mt-0.5 ${pDelta>0?"text-emerald-600":pDelta<0?"text-coral":"text-ink/50"}`}>{pDelta>0?"▲ +":pDelta<0?"▼ ":"= "}{pDelta}g <span className="text-ink/30 font-normal">({prevAvgP}→{avgP})</span></p>
          </div>}
          {oDelta!==null && <div className="flex-1 bg-card rounded-2xl p-3.5 border border-black/5 shadow-sm">
            <p className="text-[11px] text-ink/40">Comer fora vs anterior</p>
            <p className={`text-sm font-bold mt-0.5 ${oDelta<0?"text-emerald-600":oDelta>0?"text-coral":"text-ink/50"}`}>{oDelta>0?"▲ +":oDelta<0?"▼ ":"= "}{oDelta}× <span className="text-ink/30 font-normal">({prevOut}→{out})</span></p>
          </div>}
        </div>}

        {/* AI reflection */}
        <Card className="bg-gradient-to-br from-coral/10 to-[#F4C44C]/15 border-coral/15">
          <div className="flex items-center justify-between mb-1">
            <p className="font-display text-xl text-ink">Descobertas da IA</p>
            <span className="text-[10px] text-ink/50 bg-white px-2 py-0.5 rounded-full">IA · Claude</span>
          </div>
          {reflection.length>0
            ? <ul className="mt-2.5 space-y-2.5">
                {reflection.map((line,i)=>(
                  <li key={i} className="flex gap-2.5 text-sm text-ink/75 leading-relaxed">
                    <span className="text-coral mt-0.5 flex-shrink-0">✦</span><span>{line}</span>
                  </li>
                ))}
              </ul>
            : <p className="text-xs text-ink/45 mt-1">Padrões que você talvez não tenha notado — {isDay?"do dia":"da semana"}, sem julgamento, sem dieta.</p>}
          {reflErr && <p className="text-xs text-coral mt-2">{reflErr}</p>}
          <button onClick={genReflection} disabled={reflLoad}
            className="mt-3.5 w-full py-2.5 rounded-2xl text-sm font-bold bg-ink text-cream active:scale-95 transition-transform flex items-center justify-center gap-2 disabled:opacity-60">
            {reflLoad?<><Spinner size="w-4 h-4"/> Analisando padrões…</>:(reflection.length>0?"↻ Descobrir de novo":"✦ Descobrir padrões")}
          </button>
        </Card>

        {/* rhythm & repetition */}
        <Card>
          <p className="font-display text-xl text-ink mb-3">Ritmo & repetição</p>
          <div className="grid grid-cols-3 gap-2">
            <div className="bg-cream rounded-2xl px-2 py-3 text-center">
              <div className="font-display text-xl text-ink leading-none">{avgMeals}</div>
              <div className="text-[10px] text-ink/45 mt-1 font-semibold">refeições/dia</div>
            </div>
            <div className="bg-cream rounded-2xl px-2 py-3 text-center">
              <div className="font-display text-xl text-ink leading-none">{proteinPerMeal}<span className="text-[11px] font-sans">g</span></div>
              <div className="text-[10px] text-ink/45 mt-1 font-semibold">proteína/refeição</div>
            </div>
            <div className="bg-cream rounded-2xl px-2 py-3 text-center">
              <div className="font-display text-xl text-ink leading-none">{distinct}</div>
              <div className="text-[10px] text-ink/45 mt-1 font-semibold">pratos diferentes</div>
            </div>
          </div>
          {topFoods.length>0 && <div className="mt-4">
            <p className="text-[11px] font-bold text-ink/35 uppercase tracking-[0.14em] mb-2">Mais repetidos</p>
            <div className="space-y-2">
              {topFoods.map(([f,v])=>(
                <button key={f} onClick={()=>open(`🔁 ${f}`,`${v}× · ${week.label}`,wm.filter(m=>m.food.trim()===f))}
                  className="w-full flex items-center justify-between bg-cream rounded-xl px-3 py-2 active:opacity-70">
                  <span className="text-sm text-ink/75 font-medium text-left">{f}</span>
                  <span className="text-xs text-ink/40">{v}× <span className="text-coral">ver →</span></span>
                </button>
              ))}
            </div>
          </div>}
        </Card>

        {/* reasons beyond hunger */}
        <Card>
          <p className="font-display text-xl text-ink mb-1">Além da fome</p>
          <p className="text-xs text-ink/40 mb-4">Motivos que levaram você a comer</p>
          {topReasons.length===0
            ? <p className="text-sm text-ink/45 text-center py-3">Tudo por fome real {perWord} 🎉</p>
            : topReasons.map(([name,count])=>(
              <BarRow key={name} emoji={REASON_EMOJI[name]} label={name} count={count} pct={Math.round(count/maxReason*100)} solid="#FF5A36"
                onClick={()=>open(`${REASON_EMOJI[name]} ${name}`,`${count} · ${week.label}`,wm.filter(m=>reasonsOf(m).includes(name)))}/>
            ))}
        </Card>

        {/* hunger level distribution */}
        <Card>
          <p className="font-display text-xl text-ink mb-4">Fome antes de comer</p>
          {HUNGER_LEVELS.map(h=>{
            const v=byHunger[h.label]; const ms=wm.filter(m=>m.hunger===h.label);
            return <BarRow key={h.id} emoji={h.emoji} label={`Fome ${h.label.toLowerCase()}`} count={v} pct={Math.round(v/total*100)} solid="#79C2E4"
              onClick={()=>v>0&&open(`${h.emoji} Fome ${h.label.toLowerCase()}`,`${v} refeições · ${week.label}`,ms)}/>;
          })}
          {byHunger["Nenhuma"]>0 && <p className="text-xs text-ink/50 mt-1">Você comeu {byHunger["Nenhuma"]}× sem fome — vale notar esses momentos.</p>}
        </Card>

        {/* categories */}
        <Card>
          <p className="font-display text-xl text-ink mb-4">Por categoria</p>
          {cats.map(c=>{ const ms=wm.filter(m=>m.cat===c.label); if(!ms.length) return null;
            const pct=Math.round(ms.length/total*100);
            return <BarRow key={c.id} emoji={c.emoji} label={c.label} count={ms.length} pct={pct} solid={c.c.solid} suffix={` (${pct}%)`}
              onClick={()=>open(`${c.emoji} ${c.label}`,`${ms.length} refeições · ${week.label}`,ms)}/>;
          })}
        </Card>

        {/* time of day */}
        <Card>
          <p className="font-display text-xl text-ink mb-1">Quando você come</p>
          <p className="text-xs text-ink/40 mb-4">Distribuição ao longo do dia</p>
          {TIME_BUCKETS.map(b=>{ const v=timeAgg[b.key]; const ms=wm.filter(m=>timeBucket(m.time).key===b.key);
            return <BarRow key={b.key} emoji={b.emoji} label={b.label} count={v} pct={Math.round(v/maxTime*100)} solid={b.solid}
              onClick={()=>v>0&&open(`${b.emoji} ${b.label}`,`${v} refeições · ${week.label}`,ms)}/>;
          })}
        </Card>

        {/* weekday */}
        {!isDay && <Card>
          <p className="font-display text-xl text-ink mb-4">Por dia da semana</p>
          <div className="flex items-end justify-between gap-1.5 h-28">
            {WEEKDAYS.map((d,i)=>(
              <div key={d} className="flex-1 flex flex-col items-center justify-end h-full">
                <span className="text-[10px] text-ink/40 mb-1">{dayAgg[i]||""}</span>
                <div className="w-full rounded-t-lg grow-h" style={{height:`${Math.max(dayAgg[i]?8:2,Math.round(dayAgg[i]/maxDay*100))}%`,backgroundColor:"#FF5A36"}}/>
                <span className="text-[10px] text-ink/50 mt-1.5 font-semibold">{d}</span>
              </div>
            ))}
          </div>
        </Card>}

        {/* tip */}
        <button onClick={()=>open("Além da fome",`${wm.filter(m=>reasonsOf(m).some(r=>r!=="Fome")).length} · ${week.label}`,wm.filter(m=>reasonsOf(m).some(r=>r!=="Fome")),tip)}
          className="w-full text-left bg-ink rounded-[24px] p-5 active:scale-95 transition-transform">
          <div className="flex items-start justify-between">
            <p className="text-sm font-bold text-cream/90 mb-1.5">💡 Insight {isDay?"do dia":"da semana"}</p>
            <span className="text-xs text-cream/50">ver →</span>
          </div>
          <p className="text-[15px] text-cream leading-relaxed font-display">{tip}</p>
        </button>
      </>}

    {detail && <DetailDrawer title={detail.title} subtitle={detail.subtitle} meals={detail.meals} cats={cats} extra={detail.extra} onClose={()=>setDetail(null)}/>}
  </div>;
}

/* ── SETTINGS ───────────────────────────────────────────────── */
function SettingsModal({apiKey,onApiKey,cats,onCats,meals,profile,onProfile,fbConfig,user,syncMsg,onSaveFbConfig,onConnectGoogle,onSignOut,onImport,onClearAll,onClose}){
  const [key,setKey]=useState(apiKey);
  const [showAdd,setShowAdd]=useState(false);
  const [newLabel,setNewLabel]=useState("");
  const [newEmoji,setNewEmoji]=useState("🍴");
  const [newColor,setNewColor]=useState(0);
  const [saved,setSaved]=useState(false);
  const [confirmClear,setCC]=useState(false);
  const [cfgText,setCfgText]=useState("");
  const [showCfg,setShowCfg]=useState(false);
  const [showHelp,setShowHelp]=useState(false);
  const [prof,setProf]=useState(profile||{weight:"",height:"",age:"",sex:"F",activity:"leve",goal:"manter"});
  const [profSaved,setProfSaved]=useState(false);
  const importRef=useRef();
  const targets=computeTargets(prof);

  function setP(k,v){ setProf(p=>({...p,[k]:v})); setProfSaved(false); }
  function saveProfile(){ if(targets){ onProfile(prof); setProfSaved(true); setTimeout(()=>setProfSaved(false),1500); } }
  function saveKey(){ onApiKey(key.trim()); setSaved(true); setTimeout(()=>setSaved(false),1500); }
  function addCat(){
    if(!newLabel.trim()) return;
    onCats([...cats,{id:`c_${Date.now()}`,label:newLabel.trim(),emoji:newEmoji||guessEmoji(newLabel),c:px(newColor)}]);
    setNewLabel("");setNewEmoji("🍴");setShowAdd(false);
  }
  function exportData(){
    const blob=new Blob([JSON.stringify({meals,cats,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`foodmind-backup-${todayStr()}.json`;a.click();URL.revokeObjectURL(url);
  }
  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{ try{const d=JSON.parse(ev.target.result); if(Array.isArray(d.meals)) onImport(d.meals,Array.isArray(d.cats)?d.cats:null);}catch{alert("Arquivo inválido.");} };
    reader.readAsText(file);e.target.value="";
  }

  return <div className="fixed inset-0 z-40 flex items-end justify-center bg-ink/40 fade-in" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="bg-card w-full max-w-md rounded-t-[32px] p-5 pb-10 slide-up max-h-[88vh] overflow-y-auto">
      <div className="flex items-center justify-between mb-5">
        <h2 className="font-display text-2xl text-ink">Configurações</h2>
        <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-black/5 text-ink/50 font-bold">✕</button>
      </div>

      {/* Sync */}
      <div className="mb-6 rounded-2xl border border-black/[0.06] p-4" style={{background:"radial-gradient(120% 100% at 0% 0%, #FFE9D6 0%, rgba(255,233,214,0) 60%), #FFFDF8"}}>
        <p className="text-sm font-bold text-ink/80 mb-1">☁️ Sincronizar entre aparelhos</p>
        {user
          ? <>
              <p className="text-xs text-ink/55 mb-2">Conectado como <span className="font-semibold text-ink/80">{user.email||user.displayName||"sua conta Google"}</span></p>
              <p className="text-xs text-emerald-600 mb-3">{syncMsg||"✅ Tudo sincronizado"}</p>
              <button onClick={onSignOut} className="w-full py-2.5 rounded-xl text-sm font-semibold bg-black/5 text-ink/60 active:scale-95 transition-transform">Desconectar deste aparelho</button>
              <p className="text-[10px] text-ink/35 mt-2">Abra o app com a mesma conta no celular pra ver tudo igualzinho.</p>
            </>
          : <>
              <p className="text-xs text-ink/45 mb-3">Conecte sua conta Google para que PC e celular fiquem sempre com os mesmos registros.</p>
              {!fbConfig
                ? <>
                    <button onClick={()=>setShowCfg(o=>!o)} className="w-full py-2.5 rounded-xl text-sm font-bold bg-ink text-cream active:scale-95 transition-transform">{showCfg?"Cancelar":"Configurar sincronização"}</button>
                    {showCfg && <div className="mt-3 fade-in">
                      <p className="text-[11px] text-ink/50 mb-2">Cole abaixo o objeto <span className="font-mono">firebaseConfig</span> do seu projeto (veja o passo a passo 👇):</p>
                      <textarea value={cfgText} onChange={e=>setCfgText(e.target.value)} rows={5}
                        placeholder={'{\n  "apiKey": "…",\n  "authDomain": "…",\n  "projectId": "…",\n  "appId": "…"\n}'}
                        className="w-full border border-ink/10 rounded-xl px-3 py-2 text-xs font-mono text-ink/80 outline-none focus:border-coral/40 resize-none bg-white"/>
                      <button onClick={()=>{ if(onSaveFbConfig(cfgText)) setShowCfg(false); }}
                        className="w-full mt-2 py-2.5 rounded-xl text-sm font-bold bg-ink text-cream active:scale-95 transition-transform">Salvar config</button>
                    </div>}
                  </>
                : <button onClick={onConnectGoogle} className="w-full py-2.5 rounded-xl text-sm font-bold text-white active:scale-95 transition-transform" style={{background:"#FF5A36"}}>Conectar com o Google</button>}
              {syncMsg && <p className="text-[11px] text-ink/55 mt-2">{syncMsg}</p>}
            </>}
        <button onClick={()=>setShowHelp(o=>!o)} className="text-[11px] text-coral font-semibold mt-3">{showHelp?"ocultar passo a passo":"como configurar? (1ª vez, ~5 min)"}</button>
        {showHelp && <div className="mt-2 text-[11px] text-ink/55 leading-relaxed space-y-1.5 fade-in bg-white/70 rounded-xl p-3">
          <p>1. Acesse <span className="font-semibold">console.firebase.google.com</span> e crie um projeto (grátis).</p>
          <p>2. Em <span className="font-semibold">Build → Authentication → Sign-in method</span>, ative <span className="font-semibold">Google</span>.</p>
          <p>3. Em <span className="font-semibold">Build → Firestore Database</span>, crie um banco (modo produção).</p>
          <p>4. Em <span className="font-semibold">Regras</span> do Firestore, cole: <span className="font-mono block bg-black/5 rounded p-1 mt-1">match /foodmind/{'{'}uid{'}'} {'{'} allow read, write: if request.auth.uid == uid; {'}'}</span></p>
          <p>5. Em <span className="font-semibold">⚙️ Configurações do projeto → Seus apps → Web</span>, registre um app e copie o objeto <span className="font-mono">firebaseConfig</span> → cole aqui em cima.</p>
          <p>6. Em <span className="font-semibold">Authentication → Settings → Domínios autorizados</span>, adicione o endereço onde você abre o app.</p>
          <p className="text-coral">Importante: o login do Google só funciona se o app for aberto por um endereço (ex.: <span className="font-mono">localhost</span> ou um site grátis tipo Netlify/GitHub Pages/Firebase Hosting), não abrindo o arquivo direto (file://).</p>
        </div>}
      </div>

      <div className="mb-6">
        <p className="text-sm font-bold text-ink/80 mb-1">🔑 Anthropic API Key</p>
        <p className="text-xs text-ink/40 mb-3">Habilita análise de foto, estimativa de macros e categorias inteligentes (Claude Haiku).</p>
        <div className="flex gap-2">
          <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-…"
            className="flex-1 border border-ink/10 rounded-2xl px-3 py-2.5 text-sm outline-none focus:border-coral/40"/>
          <button onClick={saveKey} className="px-4 py-2.5 bg-ink text-cream text-sm font-bold rounded-2xl active:scale-95 transition-transform">Salvar</button>
        </div>
        {saved && <p className="text-xs text-emerald-600 mt-2">✅ Salvo!</p>}
        {apiKey && !saved && <p className="text-xs text-emerald-600 mt-2">✅ API Key configurada</p>}
      </div>

      {/* Profile / daily targets */}
      <div className="mb-6">
        <p className="text-sm font-bold text-ink/80 mb-1">🎯 Suas metas diárias</p>
        <p className="text-xs text-ink/40 mb-3">Preencha seu perfil para calcular calorias e macros ideais por dia.</p>
        <div className="grid grid-cols-3 gap-2">
          {[["weight","Peso (kg)","número"],["height","Altura (cm)","número"],["age","Idade","anos"]].map(([k,lbl])=>(
            <div key={k} className="bg-cream rounded-2xl px-3 py-2">
              <p className="text-[10px] font-semibold text-ink/45 mb-0.5">{lbl}</p>
              <input type="number" inputMode="numeric" value={prof[k]} onChange={e=>setP(k,e.target.value)} placeholder="—"
                className="w-full bg-transparent text-base font-bold text-ink outline-none"/>
            </div>
          ))}
        </div>
        <div className="mt-3">
          <p className="text-[10px] font-semibold text-ink/45 mb-1.5">Sexo (para o cálculo)</p>
          <div className="flex gap-2">
            {[["F","Feminino"],["M","Masculino"],["O","Prefiro não dizer"]].map(([v,l])=>(
              <button key={v} onClick={()=>setP("sex",v)} className={`flex-1 py-2 rounded-xl text-xs font-bold border-2 transition-all ${prof.sex===v?"border-coral bg-coral/10 text-ink":"border-ink/10 bg-cream text-ink/50"}`}>{l}</button>
            ))}
          </div>
        </div>
        <div className="mt-3">
          <p className="text-[10px] font-semibold text-ink/45 mb-1.5">Nível de atividade</p>
          <div className="flex flex-wrap gap-1.5">
            {ACTIVITY.map(a=>(
              <button key={a.id} onClick={()=>setP("activity",a.id)} title={a.desc}
                className={`px-2.5 py-1.5 rounded-full text-xs font-semibold border-2 transition-all ${prof.activity===a.id?"border-coral bg-coral/10 text-ink":"border-ink/10 bg-cream text-ink/50"}`}>{a.label}</button>
            ))}
          </div>
        </div>
        <div className="mt-3">
          <p className="text-[10px] font-semibold text-ink/45 mb-1.5">Objetivo</p>
          <div className="flex gap-2">
            {GOALS.map(g=>(
              <button key={g.id} onClick={()=>setP("goal",g.id)} className={`flex-1 py-2 rounded-xl text-xs font-bold border-2 transition-all ${prof.goal===g.id?"border-coral bg-coral/10 text-ink":"border-ink/10 bg-cream text-ink/50"}`}>{g.label}</button>
            ))}
          </div>
        </div>

        {targets && <div className="mt-4 bg-cream rounded-2xl p-3.5">
          <div className="grid grid-cols-4 gap-2">
            <div className="rounded-xl px-2 py-2.5 text-center" style={{backgroundColor:"#211C16"}}>
              <div className="font-display text-lg text-cream leading-none">{targets.calories}</div>
              <div className="text-[9px] text-cream/60 mt-1 font-medium">kcal</div>
            </div>
            {MACROS.map(mc=>(
              <div key={mc.key} className="rounded-xl px-2 py-2.5 text-center" style={{backgroundColor:mc.color+"44"}}>
                <div className="font-display text-lg text-ink leading-none">{targets[mc.key]}<span className="text-[10px] font-sans">g</span></div>
                <div className="text-[9px] text-ink/55 mt-1 font-semibold">{mc.label}</div>
              </div>
            ))}
          </div>
          <p className="text-[11px] text-ink/50 mt-2.5">IMC {targets.bmi} · {bmiNote(targets.bmi)} <span className="text-ink/30">(referência geral)</span></p>
        </div>}
        <button onClick={saveProfile} disabled={!targets}
          className={`w-full mt-3 py-2.5 rounded-2xl text-sm font-bold transition-all ${targets?"bg-ink text-cream active:scale-95":"bg-black/5 text-ink/30"}`}>
          {profSaved?"✅ Metas salvas!":"Salvar metas"}
        </button>
        <p className="text-[10px] text-ink/35 mt-2 leading-relaxed">Estimativas por fórmula padrão (Mifflin-St Jeor), não substituem orientação de um nutricionista. Seu corpo não é uma meta a bater — use como bússola, não como regra. 🌿</p>
      </div>

      <div>
        <div className="flex items-center justify-between mb-3">
          <p className="text-sm font-bold text-ink/80">🏷️ Categorias</p>
          <button onClick={()=>setShowAdd(o=>!o)} className="text-xs text-coral font-bold px-3 py-1 bg-coral/10 rounded-full">{showAdd?"Cancelar":"+ Nova"}</button>
        </div>
        <p className="text-[11px] text-ink/40 mb-3">A IA também cria categorias novas automaticamente conforme você registra.</p>
        {showAdd && <div className="bg-cream rounded-2xl p-3 mb-3 space-y-3 fade-in">
          <div className="flex gap-2">
            <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} className="w-12 text-center border border-ink/10 rounded-xl py-2 text-xl outline-none"/>
            <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Nome da categoria" className="flex-1 border border-ink/10 rounded-xl px-3 py-2 text-sm outline-none"/>
          </div>
          <div className="flex gap-2 flex-wrap">
            {PALETTE.map((c,i)=><button key={i} onClick={()=>setNewColor(i)}
              className={`w-7 h-7 rounded-full border-2 transition-all ${newColor===i?"border-ink scale-110":"border-white shadow"}`} style={{background:c.solid}}/>)}
          </div>
          <button onClick={addCat} disabled={!newLabel.trim()} className={`w-full py-2 rounded-xl text-sm font-bold ${newLabel.trim()?"bg-ink text-cream":"bg-black/5 text-ink/30"}`}>Adicionar</button>
        </div>}
        <div className="space-y-2">
          {cats.map(c=><div key={c.id} className="flex items-center justify-between py-2 px-3 bg-cream rounded-2xl">
            <CatTag cat={c}/>
            {!PROTECTED_IDS.includes(c.id) && <button onClick={()=>onCats(cats.filter(x=>x.id!==c.id))} className="text-xs text-ink/35 hover:text-coral px-2 transition-colors">Remover</button>}
          </div>)}
        </div>
      </div>

      <div className="mt-6 pt-6 border-t border-black/5">
        <p className="text-sm font-bold text-ink/80 mb-1">💾 Seus dados</p>
        <p className="text-xs text-ink/40 mb-3">Tudo fica salvo só no seu navegador. Faça backup de vez em quando.</p>
        <div className="flex gap-2">
          <button onClick={exportData} className="flex-1 py-2.5 rounded-2xl text-sm font-bold bg-black/5 text-ink/70 active:scale-95 transition-transform">⬇️ Exportar</button>
          <button onClick={()=>importRef.current.click()} className="flex-1 py-2.5 rounded-2xl text-sm font-bold bg-black/5 text-ink/70 active:scale-95 transition-transform">⬆️ Importar</button>
        </div>
        <input ref={importRef} type="file" accept="application/json,.json" className="hidden" onChange={importData}/>
        {confirmClear
          ? <div className="flex gap-2 mt-2">
              <button onClick={()=>setCC(false)} className="flex-1 py-2.5 rounded-2xl text-sm font-semibold bg-black/5 text-ink/60">Cancelar</button>
              <button onClick={()=>{onClearAll();setCC(false);}} className="flex-1 py-2.5 rounded-2xl text-sm font-bold bg-coral text-white">Apagar tudo</button>
            </div>
          : <button onClick={()=>setCC(true)} className="w-full mt-2 py-2.5 rounded-2xl text-sm font-semibold text-coral bg-coral/10 active:scale-95 transition-transform">🗑️ Apagar todos os registros</button>}
      </div>
    </div>
  </div>;
}

/* ── APP ────────────────────────────────────────────────────── */
const TABS=[{id:"register",emoji:"✦",label:"Registrar"},{id:"history",emoji:"❤",label:"Histórico"},{id:"insights",emoji:"☀",label:"Insights"}];

function App(){
  const [tab,setTab]=useState("register");
  const [meals,setMeals]=useState(()=>lsGet("fm3_meals",()=>[]));
  const [cats,setCats]=useState(()=>lsGet("fm3_cats",()=>DEFAULT_CATS));
  const [apiKey,setApiKey]=useState(()=>lsGet("fm_key",()=>""));
  const [profile,setProfile]=useState(()=>lsGet("fm_profile",()=>null));
  const [fbConfig,setFbConfig]=useState(()=>lsGet("fm_fbconfig",()=>null));
  const [user,setUser]=useState(null);
  const [syncMsg,setSyncMsg]=useState("");
  const [toast,setToast]=useState(false);
  const [settings,setSettings]=useState(false);
  const [editing,setEditing]=useState(null);
  const remoteApplied=useRef(null);
  const writeTimer=useRef(null);
  const unsubDoc=useRef(null);

  useEffect(()=>lsSet("fm3_meals",meals),[meals]);
  useEffect(()=>lsSet("fm3_cats",cats),[cats]);
  useEffect(()=>lsSet("fm_key",apiKey),[apiKey]);
  useEffect(()=>lsSet("fm_profile",profile),[profile]);

  function fbReady(){ return typeof firebase!=="undefined" && firebase.apps; }
  function ensureInit(cfg){
    if(!fbReady()) throw new Error("SDK do Firebase não carregou (sem internet?).");
    if(!firebase.apps.length) firebase.initializeApp(cfg);
  }

  // attach auth listener when config exists
  useEffect(()=>{
    if(!fbConfig) return;
    try{ ensureInit(fbConfig); }catch(e){ setSyncMsg(e.message); return; }
    const off=firebase.auth().onAuthStateChanged(u=>setUser(u||null));
    return ()=>off&&off();
  },[fbConfig]);

  // subscribe to the user's cloud doc; remote wins, else push local up
  useEffect(()=>{
    if(unsubDoc.current){ unsubDoc.current(); unsubDoc.current=null; }
    if(!user||!fbReady()||!firebase.apps.length) return;
    setSyncMsg("Sincronizando…");
    const ref=firebase.firestore().collection("foodmind").doc(user.uid);
    unsubDoc.current=ref.onSnapshot(snap=>{
      if(snap.exists){
        const d=snap.data()||{};
        const remote={meals:Array.isArray(d.meals)?d.meals:[],cats:Array.isArray(d.cats)?d.cats:DEFAULT_CATS,profile:d.profile||null};
        const ser=JSON.stringify(remote);
        if(ser!==remoteApplied.current){
          remoteApplied.current=ser;
          setMeals(remote.meals); setCats(remote.cats); setProfile(remote.profile);
        }
        setSyncMsg("✅ Tudo sincronizado");
      } else {
        const data={meals:stripPhotos(meals),cats,profile:profile||null};
        remoteApplied.current=JSON.stringify(data);
        ref.set({...data,updatedAt:Date.now()}).then(()=>setSyncMsg("✅ Tudo sincronizado")).catch(e=>setSyncMsg("Erro: "+(e.code||e.message)));
      }
    }, e=>setSyncMsg("Erro de sync: "+(e.code||e.message)));
    return ()=>{ if(unsubDoc.current){unsubDoc.current();unsubDoc.current=null;} };
  },[user]);

  // push local changes up (debounced)
  useEffect(()=>{
    if(!user||!fbReady()||!firebase.apps.length) return;
    const data={meals:stripPhotos(meals),cats,profile:profile||null};
    const ser=JSON.stringify(data);
    if(ser===remoteApplied.current) return;
    clearTimeout(writeTimer.current);
    writeTimer.current=setTimeout(()=>{
      remoteApplied.current=ser;
      firebase.firestore().collection("foodmind").doc(user.uid).set({...data,updatedAt:Date.now()})
        .then(()=>setSyncMsg("✅ Tudo sincronizado")).catch(e=>setSyncMsg("Erro: "+(e.code||e.message)));
    },900);
    return ()=>clearTimeout(writeTimer.current);
  },[meals,cats,profile,user]);

  function saveFbConfig(text){
    const cfg=parseFbConfig(text);
    if(!cfg){ setSyncMsg("Config inválida — cole o objeto firebaseConfig do Console."); return false; }
    lsSet("fm_fbconfig",cfg); setFbConfig(cfg); setSyncMsg("Config salva. Agora conecte com o Google.");
    return true;
  }
  function connectGoogle(){
    try{ ensureInit(fbConfig); }catch(e){ setSyncMsg(e.message); return; }
    setSyncMsg("Abrindo login do Google…");
    firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .then(()=>setSyncMsg("Conectado!")).catch(e=>setSyncMsg("Falha no login: "+(e.code||e.message)));
  }
  function signOutFb(){ try{ if(fbReady()&&firebase.apps.length) firebase.auth().signOut(); }catch{} setUser(null); remoteApplied.current=null; setSyncMsg("Desconectado deste aparelho."); }

  function resolveCat(label){
    if(!label) return null;
    const found=cats.find(c=>c.label.toLowerCase()===label.toLowerCase());
    if(found) return found;
    const nc={id:`c_${Date.now()}`,label:label.trim(),emoji:guessEmoji(label),c:px(cats.length)};
    setCats(p=>[...p,nc]);
    return nc;
  }
  function handleSave(meal){ setMeals(p=>[...p,meal]); setToast(true); setTimeout(()=>setToast(false),2000); setTimeout(()=>setTab("history"),300); }
  function handleCatChange(id,label){ setMeals(p=>p.map(m=>m.id===id?{...m,cat:label}:m)); }
  function handleUpdate(meal){ setMeals(p=>p.map(m=>m.id===meal.id?meal:m)); }
  function handleDelete(id){ setMeals(p=>p.filter(m=>m.id!==id)); }
  function handleImport(nm,nc){ setMeals(nm); if(nc)setCats(nc); setSettings(false); }
  function handleClearAll(){ setMeals([]); setSettings(false); }

  const todayCal=meals.filter(m=>m.date===todayStr()).reduce((s,m)=>s+calOf(m),0);

  return <div className="min-h-screen font-sans text-ink" style={{background:"radial-gradient(120% 80% at 50% 0%, #FDF8EE 0%, #FAF4E8 45%, #F6EEDD 100%)"}}>
    <div className="sticky top-0 z-20 bg-cream/80 backdrop-blur border-b border-black/5">
      <div className="max-w-md mx-auto px-5 py-3.5 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="text-coral text-2xl leading-none">❤</span>
          <h1 className="font-display text-2xl font-semibold text-ink tracking-tight">FoodMind</h1>
        </div>
        <div className="flex items-center gap-3">
          {user && <span title="Sincronizado" className="text-sm" style={{opacity:.7}}>☁️</span>}
          <div className="text-right">
            <span className="text-sm font-bold text-ink">{meals.filter(m=>m.date===todayStr()).length}</span>
            <span className="text-xs text-ink/40">{todayCal?` · ${todayCal} kcal`:""}</span>
            <p className="text-[10px] text-ink/35">hoje</p>
          </div>
          <button onClick={()=>setSettings(true)} className="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-black/5 text-base">⚙️</button>
        </div>
      </div>
    </div>

    <Toast show={toast}/>

    <div className="max-w-md mx-auto px-5 pb-28">
      {tab==="register" && <RegisterTab cats={cats} apiKey={apiKey} meals={meals} onResolveCat={resolveCat} onSave={handleSave} onOpenSettings={()=>setSettings(true)}/>}
      {tab==="history"  && <HistoryTab meals={meals} cats={cats} onCatChange={handleCatChange} onEdit={setEditing}/>}
      {tab==="insights" && <InsightsTab meals={meals} cats={cats} apiKey={apiKey} profile={profile} onOpenSettings={()=>setSettings(true)}/>}
    </div>

    <div className="fixed bottom-0 inset-x-0 z-20 bg-cream/90 backdrop-blur border-t border-black/5">
      <div className="max-w-md mx-auto flex">
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)}
          className={`flex-1 pt-3 pb-5 flex flex-col items-center gap-1 transition-colors ${tab===t.id?"text-coral":"text-ink/35"}`}>
          <span className="text-lg">{t.emoji}</span>
          <span className="text-[11px] font-bold">{t.label}</span>
          {tab===t.id && <div className="w-5 h-1 bg-coral rounded-full"/>}
        </button>)}
      </div>
    </div>

    {settings && <SettingsModal apiKey={apiKey} onApiKey={setApiKey} cats={cats} onCats={setCats} meals={meals} profile={profile} onProfile={setProfile}
      fbConfig={fbConfig} user={user} syncMsg={syncMsg} onSaveFbConfig={saveFbConfig} onConnectGoogle={connectGoogle} onSignOut={signOutFb}
      onImport={handleImport} onClearAll={handleClearAll} onClose={()=>setSettings(false)}/>}
    {editing && <EditDrawer meal={editing} cats={cats} apiKey={apiKey} onResolveCat={resolveCat} onSave={handleUpdate} onDelete={handleDelete} onClose={()=>setEditing(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
